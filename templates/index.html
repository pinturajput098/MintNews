<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mint Intelligence | AI OS v4.5</title>
    
    <script>(function(s){s.dataset.zone='10910578',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');

        :root {
            --j-blue: #00d2ff;
            --j-green: #00ff88;
            --j-red: #ff3e3e;
            --bg-black: #050a0f;
            --glass: rgba(0, 210, 255, 0.05);
        }

        body, html { 
            margin: 0; padding: 0; background: var(--bg-black); color: #fff; 
            font-family: 'Orbitron', sans-serif; overflow-x: hidden;
        }

        /* 🌌 MATRIX & SCANLINES */
        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

        header {
            padding: 15px; text-align: center; background: rgba(0,0,0,0.9);
            border-bottom: 2px solid var(--j-blue); position: sticky; top: 0; z-index: 1001;
        }

        .menu-icon { position: absolute; left: 20px; top: 25px; cursor: pointer; z-index: 2001; }
        .menu-icon div { width: 25px; height: 2px; background: var(--j-blue); margin: 5px 0; }

        /* 🔍 SEARCH BAR */
        .search-container {
            padding: 10px 20px; background: rgba(0,0,0,0.8); display: flex; justify-content: center;
        }
        .search-box {
            width: 100%; max-width: 500px; position: relative;
        }
        .search-box input {
            width: 100%; padding: 10px 40px 10px 15px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--j-blue); border-radius: 20px; color: #fff;
            font-family: 'Share Tech Mono'; outline: none;
        }

        /* 💹 LIVE TICKER (TradingView) */
        .ticker-wrap {
            width: 100%; height: 40px; background: #000; border-bottom: 1px solid var(--j-blue);
            overflow: hidden;
        }

        /* 📂 SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: rgba(5, 10, 15, 0.98); border-right: 1px solid var(--j-blue);
            transition: 0.4s; z-index: 2000; padding-top: 80px;
        }
        .sidebar.active { left: 0; }
        .side-item {
            display: block; padding: 15px 25px; color: #aaa; text-decoration: none;
            font-size: 12px; border-bottom: 1px solid rgba(0,210,255,0.1);
        }
        .side-item:hover { color: var(--j-blue); background: rgba(0,210,255,0.05); }

        /* 🤖 PERSONALITY */
        .ai-selector { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .ai-btn { 
            font-size: 9px; padding: 5px 12px; border: 1px solid var(--j-blue); 
            background: transparent; color: var(--j-blue); cursor: pointer;
        }
        .ai-btn.active { background: var(--j-blue); color: #000; box-shadow: 0 0 10px var(--j-blue); }

        .container { padding: 20px; max-width: 800px; margin: auto; }

        .news-card {
            background: var(--glass); border: 1px solid rgba(0, 210, 255, 0.1);
            border-radius: 10px; margin-bottom: 30px; overflow: hidden;
            transition: 0.3s; backdrop-filter: blur(5px);
        }
        .news-img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 15px; }

        .mood-tag { font-size: 9px; padding: 2px 8px; border-radius: 3px; margin-bottom: 10px; display: inline-block; }

        .ai-terminal {
            display: none; margin-top: 15px; padding: 12px;
            background: rgba(0,0,0,0.6); border-left: 2px solid var(--j-blue);
            font-family: 'Share Tech Mono'; font-size: 13px; color: var(--j-green);
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="sidebar" id="sidebar">
        <a href="/" class="side-item">🌐 ALL NEWS</a>
        <a href="/?category=business" class="side-item">💹 FOREX TERMINAL</a>
        <a href="/?category=technology" class="side-item">🪙 CRYPTO PULSE</a>
        <a href="/?category=science" class="side-item">📊 STOCKS / F&O</a>
        <a href="#" class="side-item" onclick="alert('Coming Soon: Econ Calendar')">📅 CALENDAR</a>
    </div>

    <header>
        <div class="menu-icon" onclick="toggleSidebar()">
            <div></div><div></div><div></div>
        </div>
        <h1>MINT INTELLIGENCE</h1>
        <div class="ai-selector">
            <button class="ai-btn active" id="btn-jarvis" onclick="setAI('Jarvis', 0.8, 0.9)">JARVIS</button>
            <button class="ai-btn" id="btn-friday" onclick="setAI('Friday', 1.2, 1.1)">FRIDAY</button>
        </div>
    </header>

    <div class="ticker-wrap">
        <iframe src="https://itcs.realtimetickertape.com/ticker?symbols=FX:EURUSD,FX:GBPUSD,BITSTAMP:BTCUSD,FX:XAUUSD,INDEX:NIFTY&colorTheme=dark" 
        width="100%" height="40" frameborder="0" scrolling="no" style="border:none;"></iframe>
    </div>

    <div class="search-container">
        <div class="search-box">
            <form action="/" method="GET">
                <input type="text" name="category" placeholder="SEARCH SYSTEM DATA (e.g. NIFTY, GOLD)...">
            </form>
        </div>
    </div>

    <div class="container">
        {% for a in articles %}
        <div class="news-card">
            <img src="{{ a.urlToImage }}" class="news-img" onerror="this.src='https://images.unsplash.com/photo-1611974714024-462002ca0c71?w=500'">
            <div class="card-content">
                <span class="mood-tag" style="border: 1px solid var(--j-green); color: var(--j-green);">🟢 OPTIMAL FEED</span>
                <h3 style="font-size: 16px;">{{ a.title }}</h3>
                
                <div style="display: flex; gap: 10px;">
                    <button class="ai-btn" style="flex:1" onclick="runAI('{{ loop.index }}', '{{ a.description|replace("'", "") }}')">⚡ ANALYZE</button>
                    <a href="{{ a.url }}" target="_blank" style="flex:1; text-decoration:none;">
                        <button class="ai-btn" style="width:100%">📖 FULL UPLINK</button>
                    </a>
                </div>
                <div id="ai-{{ loop.index }}" class="ai-terminal"></div>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const fontSize = 10;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(5, 10, 15, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00d2ff";
            drops.forEach((y, i) => {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        let currentAI = { name: 'Jarvis', pitch: 0.8, rate: 0.9 };
        function setAI(name, p, r) {
            currentAI = { name, pitch: p, rate: r };
            document.querySelectorAll('.ai-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            speechSynthesis.speak(new SpeechSynthesisUtterance(name + " online."));
        }

        function runAI(id, text) {
            const box = document.getElementById('ai-'+id);
            box.style.display = "block";
            box.innerHTML = "> ACCESSING ENCRYPTED DATA...";
            
            fetch('/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({summary: text})
            }).then(res => res.json()).then(data => {
                let i = 0;
                let fullText = `[${currentAI.name.toUpperCase()}]: ${data.result}`;
                box.innerHTML = "";
                function type() {
                    if (i < fullText.length) {
                        box.innerHTML += fullText.charAt(i); i++; setTimeout(type, 30);
                    }
                }
                type();
                const msg = new SpeechSynthesisUtterance(data.result);
                msg.pitch = currentAI.pitch; msg.rate = currentAI.rate;
                speechSynthesis.speak(msg);
            });
        }
    </script>
</body>
</html>
