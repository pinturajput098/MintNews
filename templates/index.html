<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mint Intelligence | Jarvis Edition</title>
    
    <script>(function(s){s.dataset.zone='10910578',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        :root {
            --jarvis-blue: #00d2ff;
            --jarvis-glow: rgba(0, 210, 255, 0.6);
            --bg-dark: #050a0f;
            --card-glass: rgba(0, 210, 255, 0.05);
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            padding-bottom: 40px;
            background-image: radial-gradient(circle at center, #0a1a2a 0%, #050a0f 100%);
        }

        /* Jarvis Scanner Effect */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(0, 210, 255, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 210, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 1000;
        }

        header {
            padding: 25px 15px;
            text-align: center;
            border-bottom: 2px solid var(--jarvis-blue);
            background: rgba(0,0,0,0.9);
            box-shadow: 0 0 25px var(--jarvis-glow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 22px;
            letter-spacing: 5px;
            color: var(--jarvis-blue);
            text-shadow: 0 0 15px var(--jarvis-blue);
            margin: 0;
        }

        .status-bar {
            font-size: 9px;
            color: var(--jarvis-blue);
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Categories */
        .nav-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 15px;
            scrollbar-width: none;
        }

        .cat-btn {
            background: transparent;
            border: 1px solid var(--jarvis-blue);
            color: var(--jarvis-blue);
            padding: 8px 15px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 11px;
            white-space: nowrap;
            transition: 0.3s;
        }

        .cat-btn.active {
            background: var(--jarvis-blue);
            color: #000;
            box-shadow: 0 0 15px var(--jarvis-blue);
        }

        .container { padding: 15px; max-width: 700px; margin: auto; }

        .news-card {
            background: var(--card-glass);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 0 25px 0 25px;
            margin-bottom: 25px;
            padding: 0;
            overflow: hidden;
            transition: 0.4s;
        }

        .news-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid var(--jarvis-blue);
        }

        .news-content { padding: 15px; }

        .news-title {
            font-size: 16px;
            color: #fff;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .jarvis-btn {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid var(--jarvis-blue);
            color: var(--jarvis-blue);
            padding: 12px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .jarvis-btn:hover { background: var(--jarvis-blue); color: #000; }

        .ai-output {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 210, 255, 0.08);
            border-left: 3px solid var(--jarvis-blue);
            font-size: 12px;
            color: #a0c4ff;
            line-height: 1.6;
        }

        /* Loading Dots */
        .dot { display: inline-block; width: 4px; height: 4px; background: var(--jarvis-blue); border-radius: 50%; margin-left: 3px; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    </style>
</head>
<body>

    <header>
        <h1>MINT INTELLIGENCE</h1>
        <div class="status-bar">Core Status: Optimal | AI: Ready</div>
    </header>

    <div class="nav-scroll">
        <a href="/?category=top" class="cat-btn {% if current_cat == 'top' %}active{% endif %}">NETWORK</a>
        <a href="/?category=technology" class="cat-btn {% if current_cat == 'technology' %}active{% endif %}">SYSTEMS</a>
        <a href="/?category=business" class="cat-btn {% if current_cat == 'business' %}active{% endif %}">MARKETS</a>
        <a href="/?category=sports" class="cat-btn {% if current_cat == 'sports' %}active{% endif %}">COMBAT</a>
    </div>

    <div class="container">
        {% for a in articles %}
        <div class="news-card">
            <img src="{{ a.urlToImage }}" class="news-img" loading="lazy">
            <div class="news-content">
                <h3 class="news-title">{{ a.title }}</h3>
                
                <button class="jarvis-btn" onclick="startAnalysis('{{ loop.index }}', '{{ a.full_desc|replace("'", "")|replace("\n", " ") }}')">
                    RUN AI ANALYSIS
                </button>

                <div id="ai-{{ loop.index }}" class="ai-output"></div>
            </div>
        </div>

        {% if loop.index % 2 == 0 %}
        <div style="text-align:center; margin-bottom: 25px;">
            <script>(function(s){s.dataset.zone='10910514',s.src='https://n6wxm.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
        </div>
        {% endif %}
        {% endfor %}
    </div>

    <script>
        function startAnalysis(id, text) {
            const output = document.getElementById('ai-'+id);
            output.style.display = "block";
            output.innerHTML = "ACCESSING DATA STREAMS<span class='dot'></span><span class='dot'></span><span class='dot'></span>";

            fetch('/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({summary: text})
            })
            .then(res => res.json())
            .then(data => {
                output.innerHTML = "<strong>SYSTEM INSIGHT:</strong><br>" + data.result;
                
                // Jarvis Voice
                const speech = new SpeechSynthesisUtterance(data.result);
                speech.rate = 1.0;
                speech.pitch = 0.8; 
                window.speechSynthesis.speak(speech);
            });
        }
    </script>
</body>
</html>
